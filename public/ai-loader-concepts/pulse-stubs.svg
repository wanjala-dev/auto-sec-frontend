<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pulseGradient" x1="120" y1="120" x2="680" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5ab5b" />
      <stop offset="0.5" stop-color="#4a9974" />
      <stop offset="1" stop-color="#229b70" />
    </linearGradient>
    <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="#0b0f12" />

  <circle
    cx="400"
    cy="400"
    r="215"
    stroke="url(#pulseGradient)"
    stroke-width="16"
    opacity="0.85"
    filter="url(#pulseGlow)"
  />
  <circle
    cx="400"
    cy="400"
    r="215"
    stroke="url(#pulseGradient)"
    stroke-width="4"
    opacity="0.95"
  />

  <g stroke="url(#pulseGradient)" stroke-width="8" stroke-linecap="round" opacity="0.85">
    <line x1="400" y1="120" x2="400" y2="80" />
    <line x1="400" y1="680" x2="400" y2="720" />
    <line x1="120" y1="400" x2="80" y2="400" />
    <line x1="680" y1="400" x2="720" y2="400" />
    <line x1="570" y1="230" x2="600" y2="200" />
    <line x1="230" y1="570" x2="200" y2="600" />
    <line x1="230" y1="230" x2="200" y2="200" />
    <line x1="570" y1="570" x2="600" y2="600" />
  </g>

  <g fill="url(#pulseGradient)" opacity="0.7">
    <circle cx="400" cy="80" r="6" />
    <circle cx="400" cy="720" r="6" />
    <circle cx="80" cy="400" r="6" />
    <circle cx="720" cy="400" r="6" />
    <circle cx="600" cy="200" r="5" />
    <circle cx="200" cy="600" r="5" />
    <circle cx="200" cy="200" r="5" />
    <circle cx="600" cy="600" r="5" />
  </g>

  <circle cx="400" cy="400" r="130" stroke="#1b1f26" stroke-width="2" opacity="0.5" />
</svg>
