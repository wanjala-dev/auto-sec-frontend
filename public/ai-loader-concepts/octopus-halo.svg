<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="haloGradient" x1="120" y1="120" x2="680" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5ab5b" />
      <stop offset="0.5" stop-color="#4a9974" />
      <stop offset="1" stop-color="#229b70" />
    </linearGradient>
    <filter id="haloGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="#0b0f12" />

  <circle
    cx="400"
    cy="400"
    r="220"
    stroke="url(#haloGradient)"
    stroke-width="20"
    opacity="0.85"
    filter="url(#haloGlow)"
  />
  <circle
    cx="400"
    cy="400"
    r="220"
    stroke="url(#haloGradient)"
    stroke-width="6"
    opacity="0.95"
  />

  <g stroke="url(#haloGradient)" stroke-width="6" stroke-linecap="round" opacity="0.85">
    <path d="M 400 150 C 360 135 350 110 380 90" />
    <path d="M 400 150 C 440 135 450 110 420 90" />
  </g>

  <g stroke="url(#haloGradient)" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <path d="M 400 650 C 360 665 350 690 380 710" transform="rotate(180 400 400)" />
    <path d="M 400 650 C 440 665 450 690 420 710" transform="rotate(180 400 400)" />
  </g>

  <g stroke="url(#haloGradient)" stroke-width="5" stroke-linecap="round" opacity="0.6">
    <path d="M 640 400 C 660 360 690 350 710 380" transform="rotate(90 400 400)" />
    <path d="M 640 400 C 660 440 690 450 710 420" transform="rotate(90 400 400)" />
    <path d="M 640 400 C 660 360 690 350 710 380" transform="rotate(270 400 400)" />
    <path d="M 640 400 C 660 440 690 450 710 420" transform="rotate(270 400 400)" />
  </g>

  <circle cx="400" cy="400" r="150" stroke="#1b1f26" stroke-width="2" opacity="0.6" />
</svg>
