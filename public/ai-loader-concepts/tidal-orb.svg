<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 400) rotate(90) scale(190)">
      <stop offset="0" stop-color="#f5ab5b" stop-opacity="0.35" />
      <stop offset="0.45" stop-color="#4a9974" stop-opacity="0.35" />
      <stop offset="1" stop-color="#0b0f12" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="orbRing" x1="150" y1="150" x2="650" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5ab5b" />
      <stop offset="0.5" stop-color="#4a9974" />
      <stop offset="1" stop-color="#229b70" />
    </linearGradient>
    <filter id="orbGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" fill="#0b0f12" />

  <circle
    cx="400"
    cy="400"
    r="240"
    stroke="url(#orbRing)"
    stroke-width="10"
    opacity="0.7"
  />
  <circle
    cx="400"
    cy="400"
    r="200"
    stroke="url(#orbRing)"
    stroke-width="6"
    opacity="0.85"
  />

  <circle cx="400" cy="400" r="190" fill="url(#orbCore)" filter="url(#orbGlow)" />

  <g stroke="url(#orbRing)" stroke-linecap="round" fill="none" opacity="0.6">
    <ellipse cx="400" cy="400" rx="150" ry="90" stroke-width="2" stroke-dasharray="1 10" />
    <ellipse cx="400" cy="400" rx="110" ry="160" stroke-width="2" stroke-dasharray="1 12" transform="rotate(25 400 400)" />
    <ellipse cx="400" cy="400" rx="170" ry="70" stroke-width="2" stroke-dasharray="1 14" transform="rotate(-20 400 400)" />
  </g>

  <g fill="url(#orbRing)" opacity="0.7">
    <circle cx="520" cy="360" r="4" />
    <circle cx="300" cy="330" r="3.5" />
    <circle cx="260" cy="460" r="3" />
    <circle cx="470" cy="520" r="3.5" />
    <circle cx="560" cy="450" r="2.8" />
  </g>
</svg>
